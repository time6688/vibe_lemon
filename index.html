<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 神隊友感恩牆</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; } /* 防止 Vue 載入前的閃爍 */
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; min-height: 100vh; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 1.25rem; }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <div id="app" v-cloak class="max-w-7xl mx-auto px-6 py-10">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-8">
            <div>
                <h1 class="text-5xl font-extrabold gradient-text mb-2">{{ t.title }}</h1>
                <p class="text-slate-400">Celebrating our amazing teammates together.</p>
            </div>
            <div class="flex p-1.5 bg-slate-900 rounded-2xl border border-slate-700">
                <button v-for="(name, lang) in languages" :key="lang" @click="currentLang = lang"
                        :class="['px-5 py-2 rounded-xl transition', currentLang === lang ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white']">
                    {{ name }}
                </button>
            </div>
        </header>

        <section v-if="topThree.length > 0" class="mb-20">
            <h2 class="text-2xl font-bold mb-8 flex items-center"><i class="fas fa-crown text-yellow-500 mr-3"></i>{{ t.topThree }}</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div v-for="(item, index) in topThree" :key="index" class="glass-card p-8 text-center group">
                    <i class="fas fa-medal text-4xl mb-4" :class="index === 0 ? 'text-yellow-400' : index === 1 ? 'text-slate-300' : 'text-orange-500'"></i>
                    <h3 class="text-2xl font-bold mb-1">{{ item.name }}</h3>
                    <p class="text-indigo-400 text-sm mb-4">{{ item.dept }}</p>
                    <div class="text-pink-500 font-bold bg-pink-500/10 py-2 px-4 rounded-full inline-flex items-center"><i class="fas fa-heart mr-2"></i>{{ item.likes }}</div>
                </div>
            </div>
        </section>

        <section class="glass-card p-10 mb-20 border-l-8 border-indigo-500">
            <h3 class="text-2xl font-bold mb-6"><i class="fas fa-scroll mr-3 text-indigo-400"></i>{{ t.rulesTitle }}</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div v-for="rule in t.rules" :key="rule" class="text-slate-300 border-b border-white/5 pb-2">★ {{ rule }}</div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-bold">{{ t.wallTitle }}</h2>
                <select v-model="selectedDept" class="bg-slate-800 text-white border border-slate-700 p-2 rounded-xl">
                    <option value="All">{{ t.allDepts }}</option>
                    <option v-for="dept in departments" :key="dept" :value="dept">{{ dept }}</option>
                </select>
            </div>

            <div v-if="loading" class="text-center py-20 text-indigo-500 animate-pulse text-xl font-bold">載入資料中...</div>

            <div v-else class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <div v-for="msg in filteredMessages" :key="msg.id" class="glass-card p-8 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between mb-4"><span class="bg-indigo-500/20 text-indigo-300 px-3 py-1 rounded text-[10px]">{{ msg.dept }}</span><span class="text-[10px] text-slate-500">{{ msg.time }}</span></div>
                        <p class="text-slate-200 text-lg italic mb-8">"{{ msg.content }}"</p>
                    </div>
                    <div class="flex justify-between items-center pt-4 border-t border-white/5">
                        <span class="font-bold text-white">{{ msg.name }}</span>
                        <div class="text-slate-500 text-sm"><i class="fas fa-heart text-pink-500/30 mr-1"></i>0</div>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const currentLang = ref('zh');
                const selectedDept = ref('All');
                const rawData = ref([]);
                const loading = ref(true);

                // --- ⚠️ 重要：請在此替換你的 Google Apps Script URL ⚠️ ---
                const API_URL = "https://script.google.com/macros/s/AKfycbxyQdcpF2mRS1JP6DVInJIen7uv70gmjTAPOp16On74NME507zFBoKRf4qdS0bqkM9x/exec"; 

                const TRANSLATIONS = {
                    zh: { title: "神隊友感恩牆", topThree: "感恩人氣排行榜", rulesTitle: "活動詳情與規則", rules: ["保持正面與感恩的心", "每列最多推薦三位神隊友", "系統與試算表同步", "前三名將獲得神秘禮物"], wallTitle: "感謝留言板", filterByDept: "篩選", allDepts: "所有部門" },
                    cn: { title: "神队友感恩墙", topThree: "感恩人气排行榜", rulesTitle: "活动详情与规则", rules: ["保持正面与感恩的心", "每行最多推荐三位神队友", "系统与试算表同步", "前三名将获得神秘礼物"], wallTitle: "感谢留言板", filterByDept: "筛选", allDepts: "所有部门" },
                    en: { title: "Teammate Wall", topThree: "Leaderboard", rulesTitle: "Rules", rules: ["Keep it positive", "Max 3 nominations per entry", "Synced with Sheet", "Top 3 win prizes"], wallTitle: "Appreciation Wall", filterByDept: "Filter", allDepts: "All Depts" },
                    jp: { title: "感謝の壁", topThree: "ランキング", rulesTitle: "ルール", rules: ["ポジティブに", "1行につき3人まで", "スプレッドシートと同期", "上位3名にプレゼント"], wallTitle: "メッセージ一覧", filterByDept: "部署", allDepts: "すべての部署" }
                };

                const fetchData = async () => {
                    loading.value = true;
                    try {
                        const res = await fetch(API_URL);
                        const data = await res.json();
                        if (data && Array.isArray(data)) {
                            rawData.value = data;
                        }
                    } catch (e) {
                        console.error("資料讀取失敗:", e);
                    } finally {
                        loading.value = false;
                    }
                };

                onMounted(fetchData);

                const t = computed(() => TRANSLATIONS[currentLang.value]);
                const languages = { zh: '繁', cn: '簡', en: 'EN', jp: 'JP' };
                const departments = computed(() => [...new Set(rawData.value.map(m => m.dept))].filter(d => d));
                const filteredMessages = computed(() => {
                    let list = [...rawData.value].sort((a, b) => new Date(b.time) - new Date(a.time));
                    return selectedDept.value === 'All' ? list : list.filter(m => m.dept === selectedDept.value);
                });
                const topThree = computed(() => {
                    const counts = {};
                    rawData.value.forEach(m => counts[m.name] = (counts[m.name] || 0) + 1);
                    return Object.keys(counts).map(n => ({ name: n, dept: rawData.value.find(m => m.name === n).dept, likes: counts[n] }))
                        .sort((a, b) => b.likes - a.likes).slice(0, 3);
                });

                return { currentLang, selectedDept, loading, languages, t, departments, filteredMessages, topThree };
            }
        }).mount('#app');
    </script>
</body>
</html>
