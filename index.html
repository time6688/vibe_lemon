<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWAG 新手限定雙重禮遇</title>
    <style>
        /* --- 基礎設定 --- */
        :root {
            --swag-pink: #ff2d55;
            --swag-purple: #9d00ff;
            --neon-red: #ff003c;
            --gold: #ffd700;
            --gold-gradient: linear-gradient(135deg, #fff8db 0%, #ffd700 50%, #d4af37 100%);
            --bg-dark: #050505;
            --card-bg: rgba(25, 25, 25, 0.9);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-dark);
            /* 深邃的背景，強調私密感 */
            background-image: radial-gradient(circle at center, #1a0b2e 0%, #000000 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 600px; /* 手機版型優化寬度 */
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 20px 15px;
            box-shadow: 0 0 30px rgba(157, 0, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        /* --- 頂部倒數區 --- */
        .header-section {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            color: #00f2ea;
            letter-spacing: 2px;
            margin-bottom: 5px;
            display: inline-block;
        }

        .timer-box {
            background: rgba(255, 0, 60, 0.1);
            border: 1px solid var(--neon-red);
            display: inline-block;
            padding: 5px 20px;
            border-radius: 50px;
            margin-top: 10px;
        }

        .countdown {
            font-family: 'Courier New', monospace;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--neon-red);
            text-shadow: 0 0 10px var(--neon-red);
        }

        .timer-label {
            color: #ffcccc;
            font-size: 0.8rem;
            margin-top: 5px;
        }

        /* --- 商品卡片容器 --- */
        .products-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* --- 通用卡片樣式 --- */
        .product-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* --- 主力商品 (5880鑽) 特殊樣式 --- */
        .card-premium {
            border: 2px solid var(--gold);
            background: linear-gradient(to bottom, rgba(40, 30, 10, 0.9), rgba(0,0,0,0.9));
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
            flex-direction: column; /* 垂直排列內容以獲得更多空間 */
            padding: 25px 20px;
            order: 1; /* 確保它排在第一個 (或視需求調整) */
            overflow: hidden;
        }

        /* 皇冠標籤 */
        .best-value-badge {
            position: absolute;
            top: 0;
            right: 0;
            background: var(--gold-gradient);
            color: #584600;
            font-weight: bold;
            font-size: 0.8rem;
            padding: 5px 15px;
            border-bottom-left-radius: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        /* 100% 加量標籤 */
        .bonus-sticker {
            background: var(--neon-red);
            color: white;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            transform: rotate(-5deg);
            display: inline-block;
            margin-bottom: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            animation: pulse-scale 1.5s infinite;
        }

        .premium-content {
            text-align: center;
            width: 100%;
        }

        .premium-title {
            font-size: 1.2rem;
            color: var(--gold);
            margin-bottom: 5px;
        }

        .diamond-display {
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            margin: 10px 0;
            text-shadow: 0 2px 10px rgba(255,255,255,0.3);
        }

        .diamond-calc {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.05);
            padding: 5px;
            border-radius: 5px;
            display: inline-block;
        }

        .premium-price {
            font-size: 1.5rem;
            color: var(--gold);
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn-premium {
            background: var(--gold-gradient);
            color: #4a3b00;
            border: none;
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        /* --- 入門商品 (99元) 特殊樣式 --- */
        .card-entry {
            order: 2;
            padding: 15px 20px;
        }

        .entry-left {
            flex: 1;
        }

        .entry-title {
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .entry-desc {
            font-size: 0.8rem;
            color: #bbb;
            margin-top: 3px;
        }

        .entry-right {
            text-align: right;
        }

        .entry-price {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--swag-pink);
        }

        .original-price-small {
            font-size: 0.8rem;
            text-decoration: line-through;
            color: #666;
        }

        .btn-entry {
            background: transparent;
            border: 1px solid var(--swag-pink);
            color: var(--swag-pink);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 5px;
            cursor: pointer;
        }
        
        .btn-entry:hover {
            background: var(--swag-pink);
            color: white;
        }

        /* --- 社群驗證與底部 --- */
        .social-proof {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }

        .highlight-num {
            color: white;
            font-weight: bold;
        }

        /* --- 動畫 --- */
        @keyframes pulse-scale {
            0% { transform: scale(1) rotate(-5deg); }
            50% { transform: scale(1.1) rotate(-5deg); }
            100% { transform: scale(1) rotate(-5deg); }
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .btn-premium::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: shimmer 2.5s infinite;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="header-section">
            <div class="logo">SWAG</div>
            <div>
                <div class="timer-box">
                    <span style="font-size: 0.8rem; vertical-align: middle;">⏳ 限時優惠倒數</span>
                    <div class="countdown" id="countdown">23:59:59</div>
                </div>
            </div>
            <div class="timer-label">新用戶限定福利，離開後無法找回</div>
        </div>

        <div class="products-container">
            
            <div class="product-card card-premium">
                <div class="best-value-badge">👑 用戶首選 TOP 1</div>
                
                <div class="premium-content">
                    <div class="bonus-sticker">🔥 限時加量 100%</div>
                    <div class="premium-title">新手超值禮包</div>
                    
                    <div class="diamond-display">5,880 鑽</div>
                    
                    <div class="diamond-calc">
                        包含：2990 基礎 + <span style="color:var(--gold)">2990 額外贈送</span>
                    </div>

                    <div style="font-size: 0.8rem; color:#ccc; margin-bottom: 10px;">
                        💎 足夠觀看 <span style="color:white; font-weight:bold;">30+ 分鐘</span> 超鹹濕真人直播互動
                    </div>

                    <div class="premium-price">
                        $ 199 TWD
                    </div>

                    <button class="btn-premium" onclick="alert('購買 5880 方案')">
                        立即購買 👉
                    </button>
                </div>
            </div>

            <div class="product-card card-entry">
                <div class="entry-left">
                    <div class="entry-title">
                        🎫 10分鐘暢遊券
                    </div>
                    <div class="entry-desc">
                        只要銅板價，全站內容任你探索。<br>
                        <span style="color: #888; font-size: 0.75rem;">適合想先體驗看看的你</span>
                    </div>
                </div>
                <div class="entry-right">
                    <div class="original-price-small">$120</div>
                    <div class="entry-price">$ 99</div>
                    <button class="btn-entry" onclick="alert('購買 99 方案')">
                        立即體驗
                    </button>
                </div>
            </div>

        </div>

        <div class="social-proof">
            🔥 過去 24 小時已有 <span class="highlight-num" id="buyer-count">843</span> 位新用戶選擇了開局禮包
        </div>
    </div>

    <script>
        // 1. 倒數計時器
        function startTimer(duration, display) {
            var timer = duration, hours, minutes, seconds;
            setInterval(function () {
                hours = parseInt(timer / 3600, 10);
                minutes = parseInt((timer % 3600) / 60, 10);
                seconds = parseInt(timer % 60, 10);

                hours = hours < 10 ? "0" + hours : hours;
                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = hours + ":" + minutes + ":" + seconds;

                if (--timer < 0) {
                    timer = 0;
                    display.textContent = "00:00:00";
                    display.style.color = "#555";
                }
            }, 1000);
        }

        // 2. 隨機人數
        function setRandomBuyers() {
            const min = 700;
            const max = 1200;
            const randomNum = Math.floor(Math.random() * (max - min + 1)) + min;
            document.getElementById('buyer-count').innerText = randomNum;
        }

        window.onload = function () {
            // 倒數 23:59:59
            var daySeconds = (23 * 60 * 60) + (59 * 60) + 59; 
            var display = document.querySelector('#countdown');
            startTimer(daySeconds, display);
            setRandomBuyers();
        };
    </script>
</body>
</html>
