<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 神隊友感恩牆</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        [v-cloak] { display: none; }
        body { background: #0f172a; color: #f8fafc; font-family: 'PingFang TC', sans-serif; min-height: 100vh; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 1.5rem; transition: all 0.3s ease; }
        .glass-card:hover { border-color: rgba(99, 102, 241, 0.4); background: rgba(255, 255, 255, 0.05); }
        .gradient-text { background: linear-gradient(90deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 跑馬燈動畫 */
        .marquee-container { overflow: hidden; white-space: nowrap; position: relative; background: rgba(99, 102, 241, 0.1); padding: 15px 0; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .marquee-content { display: inline-block; animation: marquee 60s linear infinite; }
        .marquee-item { display: inline-block; margin: 0 30px; color: #a5b4fc; font-weight: 500; font-size: 0.9rem; }
        @keyframes marquee { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

        .refresh-btn i { transition: transform 0.5s ease; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        
        <header class="max-w-4xl mx-auto px-6 pt-12 pb-8 flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-4xl font-extrabold gradient-text mb-2">{{ t.title }}</h1>
                <p class="text-slate-500 text-sm italic tracking-widest uppercase">Real-time Gratitude Feed</p>
            </div>
            <div class="flex p-1 bg-slate-900/50 rounded-xl border border-slate-800 shadow-inner">
                <button v-for="(name, lang) in languages" :key="lang" @click="currentLang = lang"
                        :class="['px-4 py-1.5 rounded-lg text-xs transition font-bold', currentLang === lang ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300']">
                    {{ name }}
                </button>
            </div>
        </header>

        <div v-if="rawData && rawData.length > 0" class="marquee-container mb-12">
            <div class="marquee-content">
                <span v-for="(msg, idx) in [...rawData, ...rawData]" :key="idx" class="marquee-item">
                    <i class="fas fa-heart text-pink-500 mr-2"></i>
                    <strong>{{ msg.name }}</strong>: "{{ msg.content.substring(0,30) }}..."
                </span>
            </div>
        </div>

        <section v-if="topThree.length > 0" class="max-w-4xl mx-auto px-6 mb-16">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div v-for="(item, index) in topThree" :key="index" class="glass-card p-6 flex items-center gap-4 relative overflow-hidden">
                    <div class="text-3xl opacity-20 absolute -right-2 -bottom-2 rotate-12"><i class="fas fa-award"></i></div>
                    <div class="text-2xl font-black w-10 h-10 rounded-full flex items-center justify-center" 
                         :class="index === 0 ? 'bg-yellow-500/20 text-yellow-500' : index === 1 ? 'bg-slate-400/20 text-slate-400' : 'bg-orange-600/20 text-orange-600'">
                        {{ index + 1 }}
                    </div>
                    <div>
                        <div class="font-bold text-lg leading-tight">{{ item.name }}</div>
                        <div class="text-[10px] text-slate-500 uppercase tracking-tighter">{{ item.dept }}</div>
                        <div class="text-xs text-pink-500 font-bold mt-1"><i class="fas fa-heart mr-1"></i>{{ item.likes }}</div>
                    </div>
                </div>
            </div>
        </section>

        <main class="max-w-3xl mx-auto px-6 pb-20">
            <div class="flex justify-between items-end mb-8 px-2">
                <h2 class="text-2xl font-bold flex items-center gap-3">
                    {{ t.wallTitle }}
                    <button @click="fetchData" class="refresh-btn text-indigo-500 hover:text-indigo-400 text-sm p-2 transition active:scale-90">
                        <i class="fas fa-sync-alt" :class="{'fa-spin': loading}"></i>
                    </button>
                </h2>
                <div class="relative">
                    <select v-model="selectedDept" class="bg-slate-900 border border-slate-800 text-slate-300 text-xs rounded-lg px-3 py-2 outline-none appearance-none pr-8">
                        <option value="All">{{ t.allDepts }}</option>
                        <option v-for="dept in departments" :key="dept" :value="dept">{{ dept }}</option>
                    </select>
                    <i class="fas fa-chevron-down absolute right-3 top-3 text-[10px] text-slate-600 pointer-events-none"></i>
                </div>
            </div>

            <div v-if="loading && rawData.length === 0" class="text-center py-20 text-slate-600 italic">Synchronizing Feed...</div>

            <div v-else class="space-y-6">
                <div v-for="msg in filteredMessages" :key="msg.id" 
                     class="glass-card p-6 flex flex-col md:flex-row md:items-center justify-between gap-4 border-l-4 border-transparent hover:border-indigo-500 group">
                    <div class="flex-1">
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-xs font-bold text-indigo-400/80 bg-indigo-500/5 px-2 py-0.5 rounded">{{ msg.dept }}</span>
                            <span class="text-[10px] text-slate-600 font-mono">{{ msg.time }}</span>
                        </div>
                        <p class="text-slate-200 text-md leading-relaxed">
                            <i class="fas fa-quote-left text-slate-800 mr-2"></i>{{ msg.content }}
                        </p>
                    </div>
                    <div class="flex items-center justify-between md:justify-end md:w-32 border-t md:border-t-0 border-white/5 pt-4 md:pt-0">
                        <span class="font-bold text-slate-100">{{ msg.name }}</span>
                        <div class="md:hidden text-pink-500/40 text-xs"><i class="fas fa-heart mr-1"></i>{{ msg.likes || 0 }}</div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        createApp({
            setup() {
                const currentLang = ref('zh');
                const selectedDept = ref('All');
                const rawData = ref([]);
                const loading = ref(true);

                const API_URL = "https://script.google.com/macros/s/AKfycby-f5Rq-Iqu6Oql3odyR0srALXVuDhYeE-UDUanxI0/dev"; 

                const TRANSLATIONS = {
                    zh: { title: "神隊友感恩牆", wallTitle: "最新感言", allDepts: "所有部門" },
                    cn: { title: "神队友感恩墙", wallTitle: "最新感言", allDepts: "所有部门" },
                    en: { title: "Teammate Wall", wallTitle: "Live Feed", allDepts: "All Depts" },
                    jp: { title: "感謝の壁", wallTitle: "最新メッセージ", allDepts: "全部門" }
                };

// 確認 fetchData 是長這樣
const fetchData = async () => {
    loading.value = true;
    try {
        const res = await fetch(API_URL); // 移除 mode: 'cors' 等設定，讓瀏覽器用預設行為處理重導向
        const data = await res.json();
        if (data && Array.isArray(data)) {
            rawData.value = data;
        }
    } catch (e) {
        console.error("Fetch Error:", e);
    } finally {
        loading.value = false;
    }
};

// 務必確認最後 return 有這些東西 (尤其是 rawData)
return { 
    currentLang, selectedDept, loading, languages, t, 
    departments, filteredMessages, topThree, fetchData, rawData 
};

                onMounted(fetchData);

                const t = computed(() => TRANSLATIONS[currentLang.value] || TRANSLATIONS.zh);
                const languages = { zh: '繁', cn: '簡', en: 'EN', jp: 'JP' };
                const departments = computed(() => [...new Set(rawData.value.map(m => m.dept))].filter(d => d));
                
                const filteredMessages = computed(() => {
                    let list = [...rawData.value].sort((a, b) => new Date(b.time) - new Date(a.time));
                    return selectedDept.value === 'All' ? list : list.filter(m => m.dept === selectedDept.value);
                });

                const topThree = computed(() => {
                    const counts = {};
                    rawData.value.forEach(m => counts[m.name] = (counts[m.name] || 0) + 1);
                    return Object.keys(counts).map(n => ({ 
                        name: n, 
                        dept: (rawData.value.find(m => m.name === n) || {}).dept || "Other", 
                        likes: counts[n] 
                    })).sort((a, b) => b.likes - a.likes).slice(0, 3);
                });

                // --- ⚠️ 修正重點：務必把 rawData 丟出來給 template 使用 ---
                return { 
                    currentLang, selectedDept, loading, languages, t, 
                    departments, filteredMessages, topThree, fetchData, rawData 
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
